services:
  # PostgreSQL Database - Standard persistent storage
  db:
    image: postgres:16-alpine
    container_name: quantbackengine-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quantdb
      POSTGRES_USER: quantuser
      POSTGRES_PASSWORD: quantpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U quantuser -d quantdb" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  # Spring Boot Backend - Optimized for fast startup
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantbackengine-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/quantdb
      SPRING_DATASOURCE_USERNAME: quantuser
      SPRING_DATASOURCE_PASSWORD: quantpass
      # CORS
      APP_CORS_ALLOWED_ORIGINS: "*"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # Next.js Frontend - Production build
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8080
    container_name: quantbackengine-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # API URL for the frontend proxy to reach the backend
      NEXT_PUBLIC_API_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

volumes:
  postgres_data:
