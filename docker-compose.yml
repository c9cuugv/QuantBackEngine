services:
  # PostgreSQL Database - Standard persistent storage
  db:
    image: postgres:16-alpine
    container_name: quantbackengine-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quantdb
      POSTGRES_USER: quantuser
      POSTGRES_PASSWORD: quantpass
    shm_size: 32m
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U quantuser -d quantdb" ]
      interval: 10s
      timeout: 5s
      retries: 5
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M

  # Spring Boot Backend - Optimized for fast startup
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantbackengine-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/quantdb
      SPRING_DATASOURCE_USERNAME: quantuser
      SPRING_DATASOURCE_PASSWORD: quantpass
      # CORS
      APP_CORS_ALLOWED_ORIGINS: "*"
      # Hikari pool — small pool fits low-concurrency VPS workload
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "2"
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
      SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "30000"
      LOGGING_LEVEL_ROOT: "WARN"
      LOGGING_LEVEL_COM_QUANTBACKENGINE: "INFO"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  # Nginx - Reverse proxy + static asset cache
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: quantbackengine-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      frontend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO /dev/null http://localhost/nginx-healthz || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 16M

  # Next.js Frontend - Production build
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8080
    container_name: quantbackengine-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 96M
        reservations:
          cpus: '0.05'
          memory: 32M

volumes:
  postgres_data:
  backend_uploads:
