# ========================================
# Docker Profile Configuration
# ========================================

spring.application.name=QuantBackEngine

# Server
server.port=8080
server.tomcat.threads.max=20
server.tomcat.threads.min-spare=2
server.tomcat.accept-count=10

# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS - Allow frontend container (override via APP_CORS_ALLOWED_ORIGINS env var for production)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://frontend:3000}

# Backtest Defaults
backtest.default.initial-capital=100000.0
backtest.default.commission-rate=0.001
backtest.default.risk-free-rate=0.02

# Security
app.security.username=${API_USERNAME:admin}
app.security.password=${API_PASSWORD:quantpass123}

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator — health endpoint only, no details exposed
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# FinceptTerminal Python Bridge — disabled in Docker (no Python scripts mounted)
fincept.scripts.base-path=/app/scripts
fincept.python.executable=python3
fincept.python.timeout-seconds=60
fincept.python.market-data.enabled=true

# ML Lab disabled in Docker — VPS cannot run qlib training
fincept.python.mllab.enabled=false
fincept.python.mllab.python-executable=python3
fincept.python.mllab.qlib-scripts-path=/app/qlib-scripts
fincept.python.mllab.work-dir=/tmp/mllab
